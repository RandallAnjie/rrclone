name: build-artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feat/build-artifacts-workflow

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: rrclone-linux-amd64
          - name: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            binary: rrclone-darwin-arm64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS='${{ matrix.goos }}' GOARCH='${{ matrix.goarch }}' CGO_ENABLED=0 \
            go build -trimpath -ldflags '-s -w' -o "dist/${{ matrix.binary }}" .
          chmod +x "dist/${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error
